{% extends 'mailings/base.html' %}
{% load my_tags %}
{% block content %}
<div class="col-6">
    <div class="card mb-3">
        {% if user.is_authenticated %}
        <div class="card-body">
            <h5 class="card-title">{{ message.subject }}</h5>
            <p class="card-text">{{ message.message }}</p>
            <a href="{% url 'mailings:message_update' message.pk %}" class="btn btn-secondary">Редактировать</a>
            <a href="{% url 'mailings:message_delete' message.pk %}" class="btn btn-danger">Удалить</a>
            <a href="{% url 'mailings:message_list' %}" class="btn btn-primary">Назад</a>
        </div>
        {% else %}
        <p>Для просмотра информации требуется авторизация</p>
        {% endif %}
    </div>
</div>
{% endblock %}
